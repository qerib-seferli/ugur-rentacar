      <title>Maşınlar | Uğur RentaCar</title>
      <meta name="description" content="Rent a car kataloqu, axtarış və premium filter sistemi." />
      <meta name="robots" content="index, follow" />

    <body class="page-cars">
      <div class="site-shell">
        <div id="app-header"></div>
        <main class="page-main">
  <section class="section compact-top">
    <div class="section__header">
      <div>
        <span class="eyebrow">Kataloq</span>
        <h1>Maşın Siyahısı</h1>
      </div>
    </div>
    <div class="catalog-layout">
      <aside class="glass-panel filter-panel">
        <h3>Filterlər</h3>
        <form id="catalogFilterForm" class="stack-md">
          <div class="field-group">
            <label>Marka</label>
            <input type="text" id="filterBrand" placeholder="Marka axtar..." />
          </div>
          <div class="field-group">
            <label>Model</label>
            <input type="text" id="filterModel" placeholder="Model axtar..." />
          </div>
          <div class="field-group">
            <label>Qiymətə qədər</label>
            <input type="number" id="filterMaxPrice" placeholder="AZN" />
          </div>
          <div class="field-group">
            <label>Tarixdən</label>
            <input type="date" id="filterStartDate" />
          </div>
          <div class="field-group">
            <label>Tarixə</label>
            <input type="date" id="filterEndDate" />
          </div>
          <label class="check-row">
            <input type="checkbox" id="filterVip" />
            <span>Yalnız VIP</span>
          </label>
          <button class="btn btn-primary" type="submit">Tətbiq et</button>
        </form>
      </aside>
      <section class="catalog-content">
        <div class="catalog-topbar glass-panel">
          <div class="results-meta">
            <strong id="catalogCount">0</strong> maşın tapıldı
          </div>
          <div class="search-inline">
            <input type="search" id="catalogSearch" placeholder="Tam axtarış..." />
          </div>
        </div>
        <div class="car-grid" id="carsGrid"></div>
      </section>
    </div>
  </section>
</main>

        <div id="app-footer"></div>
        <button class="floating-whatsapp" id="floatingWhatsapp" aria-label="WhatsApp ilə əlaqə">
          <span>WhatsApp</span>
        </button>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
      <script src="assets/js/supabase-config.js" defer></script>
      <script src="assets/js/supabase-client.js" defer></script>
      <script src="assets/js/utils.js" defer></script>
      <script src="assets/js/ui.js" defer></script>
      <script src="assets/js/guards.js" defer></script>
      <script src="assets/js/app.js" defer></script>
      <script src="assets/js/cars.js" defer></script>
    </body>
    </html>
