<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="theme-color" content="#07111f" />

  <title>Admin panel | Uğur RentaCar</title>
  <meta name="description" content="İstifadəçilər, maşınlar, rezervasiyalar və rəylərin idarə paneli." />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/png" href="foto/favicon.png" />
  <link rel="manifest" href="assets/seo/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/utilities.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body class="page-admin">
  <div class="site-shell">
    <div id="app-header"></div>

    <main class="page-main admin-main">
      <section class="admin-layout">
        <aside class="glass-panel admin-sidebar">
          <h2>Admin Panel</h2>

          <nav class="admin-nav">
            <button class="admin-tab is-active" data-tab="dashboard" type="button">Dashboard</button>
            <button class="admin-tab" data-tab="users" type="button">İstifadəçilər</button>
            <button class="admin-tab" data-tab="cars" type="button">Maşınlar</button>
            <button class="admin-tab" data-tab="reservations" type="button">Rezervasiyalar</button>
            <button class="admin-tab" data-tab="reviews" type="button">Rəylər</button>
          </nav>

          <button class="btn btn-outline" id="logoutAdminBtn" type="button">Çıxış et</button>
        </aside>

        <section class="admin-content">
          <!-- Dashboard -->
          <div class="glass-panel admin-panel is-visible" id="tab-dashboard">
            <h1>Dashboard</h1>
            <div class="stats-grid" id="adminStats"></div>
          </div>

          <!-- Users -->
          <div class="glass-panel admin-panel" id="tab-users">
            <div class="panel-head">
              <h2>Userlər</h2>
              <input id="adminUserSearch" placeholder="Ad, telefon, email..." />
            </div>
            <div id="adminUsersTable" class="table-shell"></div>
          </div>

          <!-- Cars -->
          <div class="glass-panel admin-panel" id="tab-cars">
            <div class="panel-head">
              <h2>Maşınlar</h2>
              <div class="panel-actions">
                <button class="btn btn-gold" id="showCarFormBtn" type="button">Yeni maşın əlavə et</button>
                <button class="btn btn-dark" id="adminRefreshCars" type="button">Yenilə</button>
              </div>
            </div>

            <div class="admin-message" id="adminCarsMessage"></div>

            <form id="adminCarForm" class="admin-form glass-subpanel">
              <div class="admin-form__head">
                <h3 id="adminCarFormTitle">Yeni maşın əlavə et</h3>
                <button class="btn btn-outline btn-sm" type="button" id="resetCarFormBtn">Formu sıfırla</button>
              </div>

              <input type="hidden" id="carId" />

              <div class="admin-form-grid">
                <div class="field-group">
                  <label for="carBrand">Marka</label>
                  <input type="text" id="carBrand" required />
                </div>

                <div class="field-group">
                  <label for="carModel">Model</label>
                  <input type="text" id="carModel" required />
                </div>

                <div class="field-group">
                  <label for="carYear">İl</label>
                  <input type="number" id="carYear" min="1900" max="2100" />
                </div>

                <div class="field-group">
                  <label for="carColor">Rəng</label>
                  <input type="text" id="carColor" />
                </div>

                <div class="field-group">
                  <label for="carFuelType">Yanacaq növü</label>
                  <select id="carFuelType">
                    <option value="">Seçin</option>
                    <option value="petrol">Benzin</option>
                    <option value="diesel">Dizel</option>
                    <option value="hybrid">Hibrid</option>
                    <option value="electric">Elektrik</option>
                  </select>
                </div>

                <div class="field-group">
                  <label for="carTransmission">Sürətlər qutusu</label>
                  <select id="carTransmission">
                    <option value="">Seçin</option>
                    <option value="automatic">Avtomat</option>
                    <option value="manual">Mexanika</option>
                  </select>
                </div>

                <div class="field-group">
                  <label for="carSeatCount">Oturacaq sayı</label>
                  <input type="number" id="carSeatCount" min="1" max="20" />
                </div>

                <div class="field-group">
                  <label for="carBodyType">Ban növü</label>
                  <input type="text" id="carBodyType" placeholder="Sedan, SUV..." />
                </div>

                <div class="field-group">
                  <label for="carDailyPrice">Günlük qiymət</label>
                  <input type="number" id="carDailyPrice" min="0" step="0.01" />
                </div>

                <div class="field-group">
                  <label for="carWeeklyPrice">Həftəlik qiymət</label>
                  <input type="number" id="carWeeklyPrice" min="0" step="0.01" />
                </div>

                <div class="field-group">
                  <label for="carMonthlyPrice">Aylıq qiymət</label>
                  <input type="number" id="carMonthlyPrice" min="0" step="0.01" />
                </div>

                <div class="field-group">
                  <label for="carDepositAmount">Depozit</label>
                  <input type="number" id="carDepositAmount" min="0" step="0.01" />
                </div>

                <div class="field-group">
                  <label for="carStatus">Status</label>
                  <select id="carStatus">
                    <option value="available">Mövcuddur</option>
                    <option value="pending_review">Yoxlanılır</option>
                    <option value="reserved">Rezervasiya olunub</option>
                    <option value="future_booked">Gələcək bron var</option>
                    <option value="in_service">Servisdədir</option>
                    <option value="inactive">Passivdir</option>
                  </select>
                </div>

                <div class="field-group">
                  <label for="carCoverImage">Əsas şəkil linki</label>
                  <input type="url" id="carCoverImage" placeholder="https://..." />
                </div>

                <div class="field-group field-group--full">
                  <label for="carGallery">Qalereya şəkilləri</label>
                  <textarea id="carGallery" rows="3" placeholder="Linkləri vergüllə yazın"></textarea>
                </div>

                <div class="field-group field-group--full">
                  <label for="carDescription">Açıqlama</label>
                  <textarea id="carDescription" rows="4"></textarea>
                </div>

                <label class="check-row">
                  <input type="checkbox" id="carIsVip" />
                  <span>VIP maşındır</span>
                </label>

                <label class="check-row">
                  <input type="checkbox" id="carIsActive" checked />
                  <span>Aktivdir</span>
                </label>
              </div>

              <div class="admin-form-actions">
                <button class="btn btn-primary" type="submit" id="saveCarBtn">Yadda saxla</button>
                <button class="btn btn-outline" type="button" id="cancelEditCarBtn">Ləğv et</button>
              </div>
            </form>

            <div id="adminCarsTable" class="table-shell mt-4"></div>
          </div>

          <!-- Reservations -->
          <div class="glass-panel admin-panel" id="tab-reservations">
            <div class="panel-head">
              <h2>Rezervasiyalar</h2>
              <button class="btn btn-primary" id="adminRefreshReservations" type="button">Yenilə</button>
            </div>
            <div id="adminReservationsTable" class="table-shell"></div>
          </div>

          <!-- Reviews -->
          <div class="glass-panel admin-panel" id="tab-reviews">
            <div class="panel-head">
              <h2>Rəylər</h2>
            </div>
            <div id="adminReviewsTable" class="table-shell"></div>
          </div>
        </section>
      </section>
    </main>

    <div id="app-footer"></div>

    <button class="floating-whatsapp" id="floatingWhatsapp" aria-label="WhatsApp ilə əlaqə">
      <span>WhatsApp</span>
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js" defer></script>
  <script src="assets/js/supabase-client.js" defer></script>
  <script src="assets/js/utils.js" defer></script>
  <script src="assets/js/ui.js" defer></script>
  <script src="assets/js/guards.js" defer></script>
  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/admin.js" defer></script>
</body>
</html>
