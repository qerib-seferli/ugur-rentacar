    <body class="page-admin">
      <div class="site-shell">
        <div id="app-header"></div>
        <main class="page-main admin-main">
  <section class="admin-layout">
    <aside class="glass-panel admin-sidebar">
      <h2>Admin Panel</h2>
      <nav class="admin-nav">
        <button class="admin-tab is-active" data-tab="dashboard">Dashboard</button>
        <button class="admin-tab" data-tab="users">İstifadəçilər</button>
        <button class="admin-tab" data-tab="cars">Maşınlar</button>
        <button class="admin-tab" data-tab="reservations">Rezervasiyalar</button>
        <button class="admin-tab" data-tab="reviews">Rəylər</button>
      </nav>
      <button class="btn btn-outline" id="logoutAdminBtn" type="button">Çıxış et</button>
    </aside>
    <section class="admin-content">
      <div class="glass-panel admin-panel is-visible" id="tab-dashboard">
        <h1>Dashboard</h1>
        <div class="stats-grid" id="adminStats"></div>
      </div>
      <div class="glass-panel admin-panel" id="tab-users">
        <div class="panel-head"><h2>Userlər</h2><input id="adminUserSearch" placeholder="Ad, telefon, email..." /></div>
        <div id="adminUsersTable" class="table-shell"></div>
      </div>
      <div class="glass-panel admin-panel" id="tab-cars">
        <div class="panel-head"><h2>Maşınlar</h2><button class="btn btn-gold" id="adminRefreshCars" type="button">Yenilə</button></div>
        <div id="adminCarsTable" class="table-shell"></div>
      </div>
      <div class="glass-panel admin-panel" id="tab-reservations">
        <div class="panel-head"><h2>Rezervasiyalar</h2><button class="btn btn-primary" id="adminRefreshReservations" type="button">Yenilə</button></div>
        <div id="adminReservationsTable" class="table-shell"></div>
      </div>
      <div class="glass-panel admin-panel" id="tab-reviews">
        <div class="panel-head"><h2>Rəylər</h2></div>
        <div id="adminReviewsTable" class="table-shell"></div>
      </div>
    </section>
  </section>
</main>

        <div id="app-footer"></div>
        <button class="floating-whatsapp" id="floatingWhatsapp" aria-label="WhatsApp ilə əlaqə">
          <span>WhatsApp</span>
        </button>
      </div>

      <script src="assets/js/admin.js" defer></script>
