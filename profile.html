    <body class="page-profile">
      <div class="site-shell">
        <div id="app-header"></div>
        <main class="page-main">
  <section class="section compact-top">
    <div class="profile-layout">
      <aside class="glass-panel profile-side">
        <div class="avatar-box">
          <img id="profileAvatarPreview" src="foto/placeholder-user.webp" alt="Profil şəkli" />
        </div>
        <input type="file" id="profileAvatarInput" accept="image/*" />
        <button class="btn btn-dark" type="button" id="uploadAvatarBtn">Şəkli yüklə</button>
        <ul class="side-list">
          <li><a href="my-reservations.html">Aktiv rezervlər</a></li>
          <li><a href="reservation-history.html">Keçmiş rezervlər</a></li>
          <li><a href="favorites.html">Sevimlilər</a></li>
        </ul>
      </aside>
      <form class="glass-panel profile-form" id="profileForm">
        <div class="section__header left">
          <div>
            <span class="eyebrow">İstifadəçi Profili</span>
            <h1>Profil məlumatları</h1>
          </div>
        </div>
        <div class="form-grid">
          <div class="field-group"><label>Ad</label><input id="profileFirstName" /></div>
          <div class="field-group"><label>Soyad</label><input id="profileLastName" /></div>
          <div class="field-group"><label>Telefon</label><input id="profilePhone" readonly /></div>
          <div class="field-group"><label>Email</label><input id="profileEmail" type="email" /></div>
          <div class="field-group"><label>Şəhər</label><input id="profileCity" /></div>
          <div class="field-group"><label>Ünvan</label><input id="profileAddress" /></div>
          <div class="field-group full"><label>Özünüz haqqında</label><textarea id="profileBio" rows="4"></textarea></div>
        </div>
        <div class="hero__actions">
          <button class="btn btn-gold" type="submit">Məlumatları yadda saxla</button>
          <button class="btn btn-outline" id="logoutUserBtn" type="button">Çıxış et</button>
        </div>
        <div id="profileMessage" class="inline-message"></div>
      </form>
    </div>
  </section>
</main>

        <div id="app-footer"></div>
        <button class="floating-whatsapp" id="floatingWhatsapp" aria-label="WhatsApp ilə əlaqə">
          <span>WhatsApp</span>
        </button>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
      <script src="assets/js/supabase-config.js" defer></script>
      <script src="assets/js/supabase-client.js" defer></script>
      <script src="assets/js/utils.js" defer></script>
      <script src="assets/js/ui.js" defer></script>
      <script src="assets/js/guards.js" defer></script>
      <script src="assets/js/app.js" defer></script>
      <script src="assets/js/profile.js" defer></script>
    </body>
