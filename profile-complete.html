<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profili Tamamla | Uğur RentaCar</title>
    <meta name="description" content="Uğur RentaCar - Profilinizi tamamlayın">
    
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="profile-complete-page auth-page">
    <header class="auth-header">
        <div class="container">
            <a href="index.html" class="logo">UĞUR RENTACAR</a>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-container" style="max-width: 600px;">
            <div class="auth-box">
                <h1 class="auth-title">Xoş gəldiniz! 👋</h1>
                <p class="auth-subtitle">Rezervasiya etmək üçün zəhmət olmasa profilinizi tamamlayın</p>
                
                <form id="profile-form" class="profile-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="first_name">Ad *</label>
                            <input type="text" id="first_name" required placeholder="Adınız">
                        </div>
                        
                        <div class="form-group">
                            <label for="last_name">Soyad *</label>
                            <input type="text" id="last_name" required placeholder="Soyadınız">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="email@example.com">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">Şəhər</label>
                            <input type="text" id="city" placeholder="Məs: Bakı">
                        </div>
                        
                        <div class="form-group">
                            <label for="address">Ünvan</label>
                            <input type="text" id="address" placeholder="Ünvanınız">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-full btn-lg">
                        Profili yadda saxla və davam et
                    </button>
                </form>
                
                <div id="profile-message" class="message" style="display:none;"></div>
                
                <div class="skip-section">
                    <button id="logout-btn" class="btn btn-text">Çıxış et</button>
                </div>
            </div>
        </div>
        
        <div id="profile-loading" class="loading-overlay" style="display:none;">
            <div class="spinner-large"></div>
        </div>
    </main>

    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/profile.js"></script>
</body>
</html>
