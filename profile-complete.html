    <body class="page-profile-complete">
      <div class="site-shell">
        <div id="app-header"></div>
        <main class="page-main">
  <section class="section compact-top narrow-section">
    <form class="glass-panel profile-form" id="profileCompleteForm">
      <div class="section__header left">
        <div>
          <span class="eyebrow">İlk giriş</span>
          <h1>Profilinizi tamamlayın</h1>
        </div>
      </div>
      <p class="muted-text">Rezervasiya etməzdən əvvəl profil məlumatlarınızı tamamlamanız tövsiyə olunur.</p>
      <div class="form-grid">
        <div class="field-group"><label>Ad</label><input id="completeFirstName" required /></div>
        <div class="field-group"><label>Soyad</label><input id="completeLastName" required /></div>
        <div class="field-group"><label>Şəhər</label><input id="completeCity" /></div>
        <div class="field-group"><label>Ünvan</label><input id="completeAddress" /></div>
        <div class="field-group"><label>Email</label><input id="completeEmail" type="email" /></div>
        <div class="field-group"><label>Telefon</label><input id="completePhone" readonly /></div>
      </div>
      <button class="btn btn-gold" type="submit">Profili tamamla</button>
      <div id="profileCompleteMessage" class="inline-message"></div>
    </form>
  </section>
</main>

        <div id="app-footer"></div>
        <button class="floating-whatsapp" id="floatingWhatsapp" aria-label="WhatsApp ilə əlaqə">
          <span>WhatsApp</span>
